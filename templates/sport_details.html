{% extends 'base.html' %}

{% block title %} Detail | page {% endblock %}

{% block content %}
<a href="/" class="nav-link"> ⬅️ back</a>
<h1>Details about {{ sport.name }}</h1>
<hr>
<div class="row">
    <div class="col">
        <div class="card" style="width: 18rem;">
            <img src="/static/images/{{ sport.img }}" class="card-img-top" alt="Movie Poster Image">
            <div class="card-body">
                <h5 class="card-title">{{ sport.name }}</h5>
                <p class="card-text">{{ sport.description }}</p>
            </div>

        </div>
    </div>
    <div class="col">
    </div>
</div>
{% endblock %}
